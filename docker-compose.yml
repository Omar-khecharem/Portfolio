version: '3.8'

services:
  backend:
    build: ./backend
    container_name: omar-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FRONTEND_URL=https://omarkhecharem.com

  frontend:
    build: ./frontend
    container_name: omar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
